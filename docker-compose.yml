version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: growthos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: growthos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: growthos-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@growthos.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    depends_on:
      - postgres
    restart: always

volumes:
  postgres_data:
